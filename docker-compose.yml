services:
  app:
    build: .
    environment:
      - APP_TITLE=Cheatsheets Search (Sheets → SQLite)
      - DB_PATH=/data/app.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  sync:
    build: .
    command: ["python", "-m", "app.sync_loop"]
    environment:
      - DB_PATH=/data/app.db
      - SYNC_INTERVAL_SEC=300
      - SHEET_XLSX_URL=${SHEET_XLSX_URL}
    volumes:
      - ./data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
